<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App - Current Forecast</title>
    <meta name="description" content="Check the current weather and forecast for any city with our beautiful weather app.">
    <link rel="stylesheet" href="index.css">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <main class="container">
        <h1>Weather App</h1>
        <div class="search-box">
            <input type="text" id="city" placeholder="Enter City Name" aria-label="City Name">
            <button id="btn">Get Weather</button>
        </div>
        <div id="result" aria-live="polite">
            <!-- Weather details will be injected here -->
        </div>
    </main>
    <script src="index.js"></script>
</body>
</html>
